<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>TABS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f4f5f7;--surf:#ffffff;--surf2:#f0f2f5;--surf3:#e4e7eb;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --gold:#c9903a;--gold-dim:rgba(201,144,58,0.12);--gold-glow:rgba(201,144,58,0.25);
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --green:#1e8a5e;--green-dim:rgba(30,138,94,0.1);
  --red:#c0392b;--red-dim:rgba(192,57,43,0.1);
  --blue:#2563eb;--blue-dim:rgba(37,99,235,0.1);
  --nav-h:54px;--r:10px;--r-sm:7px;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Barlow',system-ui,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}
.screen{display:none;flex-direction:column;width:100%;height:100%;background:var(--bg)}
.screen.active{display:flex;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* LOGIN */
#screen-login{align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 35%,#fff8ee 0%,var(--bg) 70%)}
.login-wrap{width:100%;max-width:300px;padding:2rem 1.5rem;
  display:flex;flex-direction:column;align-items:center;gap:2.5rem}
.logo-mark{display:block;font-family:'Barlow Condensed',sans-serif;
  font-size:6rem;font-weight:800;letter-spacing:.1em;line-height:1;color:var(--gold);
  text-shadow:0 2px 20px var(--gold-glow)}
.logo-sub{display:block;margin-top:4px;font-size:.68rem;letter-spacing:.35em;
  text-transform:uppercase;color:var(--text3)}
.login-form{width:100%;display:flex;flex-direction:column;gap:.7rem}
.login-form input{width:100%;padding:.9rem 1rem;background:var(--surf2);
  border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text);
  font-family:'Barlow',sans-serif;font-size:1rem;text-align:center;
  letter-spacing:.12em;outline:none;transition:border-color .15s}
.login-form input:focus{border-color:var(--gold)}
.login-form input::placeholder{color:var(--text3);letter-spacing:.04em}
.login-form button{width:100%;padding:1rem;background:var(--gold);border:none;
  border-radius:var(--r);color:#fff;font-family:'Barlow Condensed',sans-serif;
  font-size:1.1rem;font-weight:700;letter-spacing:.14em;cursor:pointer;
  box-shadow:0 4px 24px var(--gold-dim);transition:opacity .15s,transform .1s}
.login-form button:active{opacity:.8;transform:scale(.98)}
.login-error{text-align:center;font-size:.8rem;color:var(--red);
  height:1.1em;opacity:0;transition:opacity .2s}
.login-error.visible{opacity:1}

/* NAV */
.app-nav{display:flex;flex-shrink:0;height:var(--nav-h);
  background:var(--surf);border-bottom:1px solid var(--border)}
.nav-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  background:none;border:none;color:var(--text2);font-family:'Barlow',sans-serif;
  font-size:.78rem;font-weight:600;cursor:pointer;position:relative;transition:color .15s}
.nav-btn svg{width:16px;height:16px;flex-shrink:0}
.nav-btn.active{color:var(--gold)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;
  height:2px;background:var(--gold);border-radius:2px 2px 0 0}

/* ACCOUNT BAR */
.account-bar{flex-shrink:0;padding:10px 12px;background:var(--surf);border-bottom:1px solid var(--border)}
.account-row{display:flex;align-items:center;gap:10px}
.account-field{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.field-label{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);font-weight:600}
.account-input{width:100px;padding:7px 10px;background:var(--surf3);
  border:1.5px solid var(--border2);border-radius:var(--r-sm);color:var(--text);
  font-family:'Barlow Condensed',sans-serif;font-size:1.35rem;font-weight:700;
  outline:none;transition:border-color .15s}
.account-input:focus{border-color:var(--gold)}
.customer-name-area{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:2px}
.cust-found{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:700;
  color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl;text-align:left}
.cust-not-found{font-size:.82rem;color:var(--red)}
.cust-placeholder{font-size:.82rem;color:var(--text3)}
.cust-loading{font-size:.82rem;color:var(--text2)}
.cust-balance{font-size:.78rem;font-weight:600}
.cust-balance.ok{color:var(--green)}
.cust-balance.low{color:var(--gold)}
.cust-balance.zero{color:var(--red)}
.new-customer-row{margin-top:8px}
.new-customer-row.hidden{display:none}
.new-name-input{width:100%;padding:7px 10px;background:var(--surf3);
  border:1.5px solid rgba(201,144,58,.4);border-radius:var(--r-sm);color:var(--text);
  font-family:'Barlow',sans-serif;font-size:.9rem;outline:none;transition:border-color .15s}
.new-name-input:focus{border-color:var(--gold)}

/* CREDITS SCREEN */
.credits-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px}
.credits-section{background:var(--surf);border-radius:var(--r);
  border:1px solid var(--border);padding:14px;margin-bottom:12px}
.credits-section-label{font-size:.65rem;font-weight:700;letter-spacing:.18em;
  text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.pkg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pkg-btn{padding:18px 10px 14px;background:var(--surf2);
  border:2px solid var(--border2);border-radius:var(--r);
  cursor:pointer;text-align:center;transition:all .15s;
  display:flex;flex-direction:column;align-items:center;gap:3px}
.pkg-btn.selected{border-color:var(--gold);background:var(--gold-dim)}
.pkg-tickets{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:800;
  color:var(--text);line-height:1}
.pkg-unit{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.pkg-price{font-size:.92rem;font-weight:600;color:var(--gold);margin-top:2px}
.credits-submit-btn{width:100%;padding:13px;background:var(--gold);border:none;
  border-radius:var(--r);color:#fff;font-family:'Barlow Condensed',sans-serif;
  font-size:1.05rem;font-weight:700;letter-spacing:.1em;cursor:pointer;
  transition:opacity .15s,transform .1s}
.credits-submit-btn:active{opacity:.82;transform:scale(.98)}
.credits-submit-btn:disabled{opacity:.35;cursor:not-allowed}
.bill-feedback{text-align:center;font-size:.82rem;padding:7px 10px;border-radius:var(--r-sm)}
.bill-feedback.success{background:var(--green-dim);color:var(--green);border:1px solid rgba(30,138,94,.25)}
.bill-feedback.error{background:var(--red-dim);color:var(--red);border:1px solid rgba(192,57,43,.25)}
.bill-feedback.hidden{display:none}

/* HISTORY SCREEN */
#screen-history{overflow:hidden}
.hist-search{flex-shrink:0;padding:10px 12px;background:var(--surf);border-bottom:1px solid var(--border)}
.hist-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.hist-container{padding:10px}
.hist-tbl{width:100%;border-collapse:collapse}
.hist-tbl th{padding:8px;text-align:left;font-size:.65rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text3);
  border-bottom:1px solid var(--border2)}
.hist-tbl td{padding:11px 8px;border-bottom:1px solid var(--border);font-size:.88rem}
.hist-tbl tr:last-child td{border-bottom:none}
.hist-summary{flex-shrink:0;padding:10px 12px;background:var(--surf);
  border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.hist-summary-label{font-size:.75rem;color:var(--text2)}
.hist-summary-val{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700}
.month-badge{display:inline-block;background:var(--gold-dim);color:var(--gold);
  border-radius:4px;padding:2px 6px;font-size:.72rem;font-weight:700;letter-spacing:.04em}

/* BILLS TABLE SCREEN */
#screen-table{overflow:hidden}
.table-controls{flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:10px 12px;background:var(--surf);border-bottom:1px solid var(--border)}
.month-select{flex:1;padding:7px 10px;background:var(--surf2);
  border:1.5px solid var(--border2);border-radius:var(--r-sm);color:var(--text);
  font-family:'Barlow',sans-serif;font-size:.88rem;outline:none}
.tbl-btn{padding:7px 12px;background:none;border:1.5px solid var(--border2);
  border-radius:var(--r-sm);color:var(--text2);font-family:'Barlow',sans-serif;
  font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap;
  text-decoration:none;display:inline-flex;align-items:center;transition:opacity .15s}
.bills-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.bills-container{padding:10px}
.tbl-msg{text-align:center;color:var(--text2);padding:3rem;font-size:.88rem}
.bills-tbl{width:100%;border-collapse:collapse}
.bills-tbl th{padding:8px;text-align:left;font-size:.65rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text3);
  border-bottom:1px solid var(--border2)}
.bills-tbl td{padding:11px 8px;border-bottom:1px solid var(--border);font-size:.88rem}
.bills-tbl tr:last-child td{border-bottom:none}
.acct-num{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:var(--gold)}
.tix-total{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:var(--text)}
.tbl-summary{flex-shrink:0;padding:10px 12px;background:var(--surf);
  border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.tbl-summary-label{font-size:.75rem;color:var(--text2)}
.tbl-summary-val{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700}
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="login-wrap">
    <div>
      <span class="logo-mark">TABS</span>
      <span class="logo-sub">Bar Management</span>
    </div>
    <div class="login-form">
      <input id="login-password" type="password" placeholder="Enter password" autocomplete="off" />
      <button id="login-btn">ENTER</button>
      <p id="login-error" class="login-error">Incorrect password — try again</p>
    </div>
  </div>
</div>

<!-- CREDITS -->
<div class="screen" id="screen-credits">
  <nav class="app-nav">
    <button class="nav-btn active" data-target="screen-credits">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      Credits
    </button>
    <button class="nav-btn" data-target="screen-table">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      Bills
    </button>
    <button class="nav-btn" data-target="screen-history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Lookup
    </button>
  </nav>
  <div class="account-bar">
    <div class="account-row">
      <div class="account-field">
        <label class="field-label">Account #</label>
        <input id="cred-account" type="tel" placeholder="—" autocomplete="off" class="account-input" />
      </div>
      <div class="customer-name-area" id="cred-customer-display">
        <span class="cust-placeholder">Enter an account number</span>
      </div>
    </div>
    <div class="new-customer-row hidden" id="cred-new-customer-row">
      <input id="cred-new-name" type="text" placeholder="Customer name (new — will be saved)" class="new-name-input" />
    </div>
  </div>
  <div class="credits-body">
    <div class="credits-section">
      <div class="credits-section-label">Select Package</div>
      <div class="pkg-grid">
        <button class="pkg-btn" data-tickets="5" data-amount="30" onclick="selectPkg(this)">
          <span class="pkg-tickets">5</span>
          <span class="pkg-unit">tickets</span>
          <span class="pkg-price">₪30</span>
        </button>
        <button class="pkg-btn" data-tickets="10" data-amount="50" onclick="selectPkg(this)">
          <span class="pkg-tickets">10</span>
          <span class="pkg-unit">tickets</span>
          <span class="pkg-price">₪50</span>
        </button>
      </div>
    </div>
    <button id="cred-submit" class="credits-submit-btn">Load Credits</button>
    <div id="cred-feedback" class="bill-feedback hidden" style="margin-top:8px"></div>
  </div>
</div>

<!-- BILLS TABLE -->
<div class="screen" id="screen-table">
  <nav class="app-nav">
    <button class="nav-btn" data-target="screen-credits">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      Credits
    </button>
    <button class="nav-btn active" data-target="screen-table">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      Bills
    </button>
    <button class="nav-btn" data-target="screen-history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Lookup
    </button>
  </nav>
  <div class="table-controls">
    <select id="month-selector" class="month-select"></select>
    <a id="open-sheet" href="#" target="_blank" class="tbl-btn">Sheets ↗</a>
  </div>
  <div class="bills-scroll">
    <div id="bills-table-container" class="bills-container">
      <p class="tbl-msg">Loading...</p>
    </div>
  </div>
  <div class="tbl-summary">
    <span class="tbl-summary-label">Total tickets this month</span>
    <span class="tbl-summary-val" id="tbl-total">—</span>
  </div>
</div>

<!-- HISTORY / LOOKUP -->
<div class="screen" id="screen-history">
  <nav class="app-nav">
    <button class="nav-btn" data-target="screen-credits">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      Credits
    </button>
    <button class="nav-btn" data-target="screen-table">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      Bills
    </button>
    <button class="nav-btn active" data-target="screen-history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Lookup
    </button>
  </nav>
  <div class="hist-search">
    <div class="account-row">
      <div class="account-field">
        <label class="field-label">Account #</label>
        <input id="hist-account" type="tel" placeholder="—" autocomplete="off" class="account-input" />
      </div>
      <div class="customer-name-area" id="hist-customer-display">
        <span class="cust-placeholder">Enter an account number</span>
      </div>
    </div>
    <div class="new-customer-row hidden" id="hist-new-customer-row"></div>
  </div>
  <div class="hist-scroll">
    <div id="hist-container" class="hist-container">
      <p class="tbl-msg">Enter an account number to see purchase history.</p>
    </div>
  </div>
  <div class="hist-summary">
    <span class="hist-summary-label">Total tickets purchased</span>
    <span class="hist-summary-val" id="hist-total">—</span>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const CONFIG = {
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbw2PKkSRFJ_GRXiTVNGQ2OuqSBeZylVoLZVN1wrcaKqDoT7XNfXd5kK13Ch1WBwox2B/exec",
  SHEET_ID: "1sxsuNSTTMBNdubWfsVWRgEFqZ624rOUTosX7TTh4Nhw",
  PASSWORD: "1948",
};

// ── STATE ─────────────────────────────────────────────────
let creditsReady = false;
let tableReady   = false;
let currentMonth = "";
let selectedPkgEl = null;

// ── SCREENS ───────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ── API ───────────────────────────────────────────────────
async function api(params) {
  const url = new URL(CONFIG.APPS_SCRIPT_URL);
  const pw  = sessionStorage.getItem("password") || "";
  Object.entries({...params, password: pw}).forEach(([k,v]) => url.searchParams.set(k,v));
  const res  = await fetch(url.toString());
  if (!res.ok) throw new Error("Network error");
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// ── LOGIN ─────────────────────────────────────────────────
function login() {
  const pw  = document.getElementById("login-password").value.trim();
  const err = document.getElementById("login-error");
  if (!pw) return;
  err.classList.remove("visible");
  if (pw === CONFIG.PASSWORD) {
    sessionStorage.setItem("password", pw);
    showScreen("screen-credits");
    initCredits();
  } else {
    err.classList.add("visible");
  }
}

// ── NAV ───────────────────────────────────────────────────
function initNav() {
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const t = btn.dataset.target;
      showScreen(t);
      if (t === "screen-credits") initCredits();
      if (t === "screen-table")   initTable();
      if (t === "screen-history") initHistory();
    });
  });
}

// ── ACCOUNT LOOKUP ────────────────────────────────────────
let lookupTimer = null;

async function lookup(account, displayId, newRowId) {
  const display = document.getElementById(displayId);
  const newRow  = document.getElementById(newRowId);
  if (!account) {
    display.innerHTML = '<span class="cust-placeholder">Enter an account number</span>';
    newRow.classList.add("hidden");
    return;
  }
  display.innerHTML = '<span class="cust-loading">Looking up…</span>';
  try {
    const r = await api({action:"lookup", account});
    if (r.found) {
      const total = r.totalCredits ?? 0;
      const bal   = r.balance ?? 0;
      const balClass = bal > 5 ? "ok" : bal > 0 ? "low" : "zero";
      display.innerHTML = `
        <span class="cust-found">${r.name}</span>
        <span class="cust-balance ${balClass}">${total} bought · ${bal} remaining</span>`;
      newRow.classList.add("hidden");
    } else {
      display.innerHTML = '<span class="cust-not-found">Account not found</span>';
      newRow.classList.remove("hidden");
    }
  } catch {
    display.innerHTML = '<span class="cust-not-found">Lookup failed</span>';
  }
}

// ── CREDITS ───────────────────────────────────────────────
function initCredits() {
  if (creditsReady) return;
  creditsReady = true;
  document.getElementById("cred-account").addEventListener("input", e => {
    clearTimeout(lookupTimer);
    lookupTimer = setTimeout(() => lookup(e.target.value.trim(), "cred-customer-display", "cred-new-customer-row"), 380);
  });
  document.getElementById("cred-submit").addEventListener("click", submitCredits);
}

function selectPkg(btn) {
  document.querySelectorAll(".pkg-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selectedPkgEl = btn;
}

async function submitCredits() {
  const account = document.getElementById("cred-account").value.trim();
  const newName = document.getElementById("cred-new-name").value.trim();
  const isNew   = !document.getElementById("cred-new-customer-row").classList.contains("hidden");
  const fb      = document.getElementById("cred-feedback");

  if (!account)          return showFeedback(fb, "Please enter an account number.", "error");
  if (!selectedPkgEl)    return showFeedback(fb, "Select a package first.", "error");
  if (isNew && !newName) return showFeedback(fb, "Enter the customer name to add them.", "error");

  const tickets = parseInt(selectedPkgEl.dataset.tickets);
  const amount  = parseFloat(selectedPkgEl.dataset.amount);

  const btn = document.getElementById("cred-submit");
  btn.disabled = true; btn.textContent = "Loading…";

  try {
    if (isNew) await api({action:"addAndBill", account, amount:0, desc:"New customer", name:newName});
    await api({action:"addCredits", account, name:newName, tickets, shekelAmount:amount});
    showFeedback(fb, `✓ ${tickets} tickets added (₪${amount})`, "success");
    document.getElementById("cred-account").value = "";
    document.getElementById("cred-new-name").value = "";
    document.getElementById("cred-customer-display").innerHTML = '<span class="cust-placeholder">Enter an account number</span>';
    document.getElementById("cred-new-customer-row").classList.add("hidden");
    document.querySelectorAll(".pkg-btn").forEach(b => b.classList.remove("selected"));
    selectedPkgEl = null;
    tableReady = false;
  } catch(err) {
    showFeedback(fb, "Error: " + err.message, "error");
  } finally {
    btn.disabled = false; btn.textContent = "Load Credits";
  }
}

function showFeedback(el, msg, type) {
  el.textContent = msg;
  el.className = "bill-feedback " + type;
  setTimeout(() => el.classList.add("hidden"), 4500);
}

// ── BILLS TABLE ───────────────────────────────────────────
async function initTable() {
  if (tableReady) return;
  tableReady = true;
  await loadMonths();
  if (currentMonth) await loadTable(currentMonth);
  document.getElementById("month-selector").addEventListener("change", e => loadTable(e.target.value));
}

async function loadMonths() {
  const sel = document.getElementById("month-selector");
  sel.innerHTML = "";
  try {
    const {months} = await api({action:"getMonths"});
    if (!months.length) { sel.innerHTML = '<option value="">No data yet</option>'; return; }
    months.forEach(m => {
      const o = document.createElement("option");
      o.value = m; o.textContent = fmtMonth(m); sel.appendChild(o);
    });
    currentMonth = months[0];
    document.getElementById("open-sheet").href =
      `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/edit`;
  } catch { sel.innerHTML = '<option value="">Error loading</option>'; }
}

function fmtMonth(key) {
  const [y,m] = key.split("_");
  return new Date(+y, +m-1, 1).toLocaleString("default", {month:"long", year:"numeric"});
}

async function loadTable(month) {
  currentMonth = month;
  const box = document.getElementById("bills-table-container");
  box.innerHTML = '<p class="tbl-msg">Loading…</p>';
  document.getElementById("tbl-total").textContent = "—";
  try {
    const {credits} = await api({action:"getCredits", month});
    renderTable(credits);
  } catch(err) {
    box.innerHTML = `<p class="tbl-msg" style="color:var(--red)">Failed: ${err.message}</p>`;
  }
}

function renderTable(credits) {
  const box = document.getElementById("bills-table-container");
  if (!credits.length) { box.innerHTML = '<p class="tbl-msg">No credits loaded this month.</p>'; return; }

  // Group by account, sum tickets
  const groups = {};
  credits.forEach(c => {
    if (!groups[c.account]) groups[c.account] = {name: c.name, tickets: 0, amount: 0};
    groups[c.account].tickets += parseInt(c.tickets) || 0;
    groups[c.account].amount  += parseFloat(c.amount) || 0;
  });

  const totalTix = Object.values(groups).reduce((s, g) => s + g.tickets, 0);
  document.getElementById("tbl-total").textContent = totalTix + " tix";

  const tbl = document.createElement("table");
  tbl.className = "bills-tbl";
  tbl.innerHTML = `<thead><tr>
    <th>Acct</th><th>Name</th><th>Tickets</th><th>Paid</th>
  </tr></thead>`;
  const tbody = document.createElement("tbody");

  Object.entries(groups)
    .sort(([a],[b]) => String(a).localeCompare(String(b)))
    .forEach(([acct, g]) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><span class="acct-num">${acct}</span></td>
        <td dir="rtl" style="text-align:left">${g.name}</td>
        <td><span class="tix-total">${g.tickets}</span></td>
        <td style="color:var(--text2)">₪${g.amount.toFixed(0)}</td>`;
      tbody.appendChild(tr);
    });

  tbl.appendChild(tbody);
  box.innerHTML = "";
  box.appendChild(tbl);
}

// ── HISTORY / LOOKUP ─────────────────────────────────────
let historyReady = false;
let histLookupTimer = null;

function initHistory() {
  if (historyReady) return;
  historyReady = true;
  const input = document.getElementById("hist-account");
  input.addEventListener("input", e => {
    clearTimeout(histLookupTimer);
    const val = e.target.value.trim();
    histLookupTimer = setTimeout(async () => {
      await lookup(val, "hist-customer-display", "hist-new-customer-row");
      if (val) await loadPersonHistory(val);
      else {
        document.getElementById("hist-container").innerHTML =
          '<p class="tbl-msg">Enter an account number to see purchase history.</p>';
        document.getElementById("hist-total").textContent = "—";
      }
    }, 420);
  });
}

async function loadPersonHistory(account) {
  const box = document.getElementById("hist-container");
  box.innerHTML = '<p class="tbl-msg">Loading…</p>';
  document.getElementById("hist-total").textContent = "—";
  try {
    const {history} = await api({action:"getPersonHistory", account});
    renderHistory(history);
  } catch(err) {
    box.innerHTML = `<p class="tbl-msg" style="color:var(--red)">Failed: ${err.message}</p>`;
  }
}

function renderHistory(history) {
  const box = document.getElementById("hist-container");
  if (!history.length) {
    box.innerHTML = '<p class="tbl-msg">No purchases found for this account.</p>';
    document.getElementById("hist-total").textContent = "0 tix";
    return;
  }

  const totalTix = history.reduce((s, h) => s + (parseInt(h.tickets) || 0), 0);
  const totalPaid = history.reduce((s, h) => s + (parseFloat(h.amount) || 0), 0);
  document.getElementById("hist-total").textContent =
    `${totalTix} tix · ₪${totalPaid.toFixed(0)}`;

  const tbl = document.createElement("table");
  tbl.className = "hist-tbl";
  tbl.innerHTML = `<thead><tr>
    <th>Month</th><th>Tickets</th><th>Paid</th><th>Date</th>
  </tr></thead>`;
  const tbody = document.createElement("tbody");

  history.forEach(h => {
    const tr = document.createElement("tr");
    const dtStr = h.datetime ? new Date(h.datetime).toLocaleDateString("he-IL", {day:"2-digit",month:"2-digit",year:"2-digit"}) : "";
    tr.innerHTML = `
      <td><span class="month-badge">${fmtMonth(h.month)}</span></td>
      <td><span class="tix-total">${h.tickets}</span></td>
      <td style="color:var(--text2)">₪${parseFloat(h.amount||0).toFixed(0)}</td>
      <td style="color:var(--text3);font-size:.8rem">${dtStr}</td>`;
    tbody.appendChild(tr);
  });

  tbl.appendChild(tbody);
  box.innerHTML = "";
  box.appendChild(tbl);
}

// ── BOOT ──────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("login-btn").addEventListener("click", login);
  document.getElementById("login-password").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });
  initNav();
  if (sessionStorage.getItem("password") === CONFIG.PASSWORD) {
    showScreen("screen-credits");
    initCredits();
  }
});
</script>
