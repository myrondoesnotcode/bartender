<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>TABS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f4f5f7;--surf:#ffffff;--surf2:#f0f2f5;--surf3:#e4e7eb;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --gold:#c9903a;--gold-dim:rgba(201,144,58,0.12);--gold-glow:rgba(201,144,58,0.25);
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --green:#1e8a5e;--green-dim:rgba(30,138,94,0.1);
  --red:#c0392b;--red-dim:rgba(192,57,43,0.1);
  --nav-h:54px;--order-bar-h:54px;--r:10px;--r-sm:7px;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Barlow',system-ui,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}
.screen{display:none;flex-direction:column;width:100%;height:100%;background:var(--bg)}
.screen.active{display:flex;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* LOGIN */
#screen-login{align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 35%,#fff8ee 0%,var(--bg) 70%)}
.login-wrap{width:100%;max-width:300px;padding:2rem 1.5rem;
  display:flex;flex-direction:column;align-items:center;gap:2.5rem}
.logo-mark{display:block;font-family:'Barlow Condensed',sans-serif;
  font-size:6rem;font-weight:800;letter-spacing:.1em;line-height:1;color:var(--gold);
  text-shadow:0 2px 20px var(--gold-glow)}
.logo-sub{display:block;margin-top:4px;font-size:.68rem;letter-spacing:.35em;
  text-transform:uppercase;color:var(--text3)}
.login-form{width:100%;display:flex;flex-direction:column;gap:.7rem}
.login-form input{width:100%;padding:.9rem 1rem;background:var(--surf2);
  border:1.5px solid var(--border2);border-radius:var(--r);color:var(--text);
  font-family:'Barlow',sans-serif;font-size:1rem;text-align:center;
  letter-spacing:.12em;outline:none;transition:border-color .15s}
.login-form input:focus{border-color:var(--gold)}
.login-form input::placeholder{color:var(--text3);letter-spacing:.04em}
.login-form button{width:100%;padding:1rem;background:var(--gold);border:none;
  border-radius:var(--r);color:#0a0908;font-family:'Barlow Condensed',sans-serif;
  font-size:1.1rem;font-weight:700;letter-spacing:.14em;cursor:pointer;
  box-shadow:0 4px 24px var(--gold-dim);transition:opacity .15s,transform .1s}
.login-form button:active{opacity:.8;transform:scale(.98)}
.login-error{text-align:center;font-size:.8rem;color:var(--red);
  height:1.1em;opacity:0;transition:opacity .2s}
.login-error.visible{opacity:1}

/* NAV */
.app-nav{display:flex;flex-shrink:0;height:var(--nav-h);
  background:var(--surf);border-bottom:1px solid var(--border)}
.nav-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  background:none;border:none;color:var(--text2);font-family:'Barlow',sans-serif;
  font-size:.83rem;font-weight:600;cursor:pointer;position:relative;transition:color .15s}
.nav-btn svg{width:17px;height:17px;flex-shrink:0}
.nav-btn.active{color:var(--gold)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;
  height:2px;background:var(--gold);border-radius:2px 2px 0 0}

/* ACCOUNT BAR */
.account-bar{flex-shrink:0;padding:10px 12px;background:var(--surf);border-bottom:1px solid var(--border)}
.account-row{display:flex;align-items:center;gap:10px}
.account-field{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.field-label{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);font-weight:600}
.account-input{width:100px;padding:7px 10px;background:var(--surf3);
  border:1.5px solid var(--border2);border-radius:var(--r-sm);color:var(--text);
  font-family:'Barlow Condensed',sans-serif;font-size:1.35rem;font-weight:700;
  outline:none;transition:border-color .15s}
.account-input:focus{border-color:var(--gold)}
.customer-name-area{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.cust-found{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:700;
  color:var(--green);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cust-not-found{font-size:.82rem;color:var(--red)}
.cust-placeholder{font-size:.82rem;color:var(--text3)}
.cust-loading{font-size:.82rem;color:var(--text2)}
.new-customer-row{margin-top:8px}
.new-customer-row.hidden{display:none}
.new-name-input{width:100%;padding:7px 10px;background:var(--surf3);
  border:1.5px solid rgba(201,144,58,.3);border-radius:var(--r-sm);color:var(--text);
  font-family:'Barlow',sans-serif;font-size:.9rem;outline:none;transition:border-color .15s}
.new-name-input:focus{border-color:var(--gold)}
.new-name-input::placeholder{color:var(--text3)}

/* CATEGORY TABS */
.cat-bar{flex-shrink:0;background:var(--surf);border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none}
.cat-bar::-webkit-scrollbar{display:none}
.cat-tabs{display:flex;gap:6px;padding:8px 12px;min-width:max-content}
.cat-tab{flex-shrink:0;padding:5px 14px;background:none;
  border:1.5px solid var(--border2);border-radius:20px;color:var(--text2);
  font-family:'Barlow',sans-serif;font-size:.78rem;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:all .15s}
.cat-tab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}

/* DRINKS GRID */
.drinks-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.drinks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px}
.drink-card{background:var(--surf2);border:1.5px solid var(--border);border-radius:var(--r);
  padding:13px 6px 11px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;text-align:center;cursor:pointer;min-height:70px;
  position:relative;user-select:none;-webkit-user-select:none;
  transition:background .12s,border-color .12s,transform .08s}
.drink-card:active{transform:scale(.91);background:var(--gold-dim);border-color:var(--gold)}
.drink-card.has-items{border-color:rgba(201,144,58,.4);background:rgba(201,144,58,.07)}
.drink-name{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:700;
  color:var(--text);line-height:1.2}
.drink-price{font-size:.78rem;font-weight:600;color:var(--gold)}
.drink-badge{position:absolute;top:-7px;right:-7px;width:21px;height:21px;
  background:var(--gold);color:#fff;border-radius:50%;
  font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(201,144,58,.4)}

/* ORDER PANEL */
.order-panel{flex-shrink:0;background:var(--surf);border-top:1.5px solid var(--border2);
  overflow:hidden;max-height:65vh;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.order-panel.collapsed{max-height:var(--order-bar-h)}
.order-bar{height:var(--order-bar-h);display:flex;align-items:center;
  padding:0 14px;gap:10px;cursor:pointer;flex-shrink:0}
.order-bar-left{display:flex;align-items:center;gap:8px}
.order-badge{display:inline-flex;align-items:center;justify-content:center;
  min-width:26px;height:26px;padding:0 6px;background:var(--gold);color:#0a0908;
  border-radius:13px;font-family:'Barlow Condensed',sans-serif;font-size:.92rem;font-weight:800}
.order-bar-label{font-size:.82rem;color:var(--text2)}
.order-bar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.order-total{font-family:'Barlow Condensed',sans-serif;font-size:1.45rem;font-weight:700;color:var(--text)}
.chevron{width:18px;height:18px;color:var(--text2);transition:transform .3s ease;flex-shrink:0}
.order-panel:not(.collapsed) .chevron{transform:rotate(180deg)}
.order-body{overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:calc(65vh - var(--order-bar-h))}
.order-items{padding:6px 14px 0;display:flex;flex-direction:column}
.order-empty{font-size:.82rem;color:var(--text3);text-align:center;padding:12px 0 8px}
.order-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.order-item:last-child{border-bottom:none}
.oi-name{flex:1;font-size:.88rem;min-width:0}
.oi-qty{display:flex;align-items:center;gap:5px}
.qty-btn{width:26px;height:26px;background:var(--surf3);border:1px solid var(--border2);
  border-radius:5px;color:var(--text);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.oi-qty-num{font-size:.88rem;min-width:16px;text-align:center}
.oi-price{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:600;
  color:var(--gold);min-width:52px;text-align:right}
.oi-remove{background:none;border:none;color:var(--text3);font-size:1rem;
  cursor:pointer;padding:0 2px;transition:color .15s;flex-shrink:0}
.oi-remove:active{color:var(--red)}
.order-foot{padding:10px 14px 14px;display:flex;flex-direction:column;gap:8px;
  border-top:1px solid var(--border)}
.note-input{width:100%;padding:8px 10px;background:var(--surf3);
  border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);
  font-family:'Barlow',sans-serif;font-size:.88rem;outline:none;transition:border-color .15s}
.note-input:focus{border-color:var(--gold)}
.note-input::placeholder{color:var(--text3)}
.submit-btn{width:100%;padding:13px;background:var(--gold);border:none;
  border-radius:var(--r);color:#0a0908;font-family:'Barlow Condensed',sans-serif;
  font-size:1.05rem;font-weight:700;letter-spacing:.1em;cursor:pointer;
  box-shadow:0 4px 20px rgba(201,144,58,.2);transition:opacity .15s,transform .1s}
.submit-btn:active{opacity:.82;transform:scale(.98)}
.submit-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.bill-feedback{text-align:center;font-size:.82rem;padding:7px 10px;border-radius:var(--r-sm)}
.bill-feedback.success{background:var(--green-dim);color:var(--green);border:1px solid rgba(61,158,120,.25)}
.bill-feedback.error{background:var(--red-dim);color:var(--red);border:1px solid rgba(184,78,58,.25)}
.bill-feedback.hidden{display:none}

/* TABLE SCREEN */
#screen-table{overflow:hidden}
.table-controls{flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:10px 12px;background:var(--surf);border-bottom:1px solid var(--border)}
.month-select{flex:1;padding:7px 10px;background:var(--surf3);
  border:1.5px solid var(--border2);border-radius:var(--r-sm);color:var(--text);
  font-family:'Barlow',sans-serif;font-size:.88rem;outline:none}
.table-actions{display:flex;gap:6px}
.tbl-btn{padding:7px 12px;background:var(--gold);border:none;border-radius:var(--r-sm);
  color:#0a0908;font-family:'Barlow',sans-serif;font-size:.78rem;font-weight:600;
  cursor:pointer;white-space:nowrap;text-decoration:none;
  display:inline-flex;align-items:center;transition:opacity .15s}
.tbl-btn:active{opacity:.8}
.tbl-btn-outline{background:none;border:1.5px solid var(--border2);color:var(--text2)}
.bills-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.bills-container{padding:10px}
.tbl-msg{text-align:center;color:var(--text2);padding:3rem;font-size:.88rem}
.bills-tbl{width:100%;border-collapse:collapse}
.bills-tbl th{padding:6px 8px;text-align:left;font-size:.68rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border2)}
.grp-row{cursor:pointer}
.grp-row td{padding:10px 8px;border-bottom:1px solid var(--border);font-size:.88rem}
.grp-row:hover td{background:var(--surf2)}
.acct-num{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:var(--gold)}
.acct-total{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700}
.expand-ico{color:var(--text3);font-size:.7rem;transition:transform .2s}
.grp-row.open .expand-ico{transform:rotate(90deg)}
.det-row{display:none}
.det-row.visible{display:table-row}
.det-row td{padding:6px 8px 6px 24px;font-size:.8rem;color:var(--text2);
  border-bottom:1px solid var(--border);background:var(--surf)}
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="login-wrap">
    <div>
      <span class="logo-mark">TABS</span>
      <span class="logo-sub">Bar Management</span>
    </div>
    <div class="login-form">
      <input id="login-password" type="password" placeholder="Enter password" autocomplete="off" />
      <button id="login-btn">ENTER</button>
      <p id="login-error" class="login-error">Incorrect password — try again</p>
    </div>
  </div>
</div>

<!-- BILLING -->
<div class="screen" id="screen-billing">
  <nav class="app-nav">
    <button class="nav-btn active" data-target="screen-billing">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
      New Bill
    </button>
    <button class="nav-btn" data-target="screen-table">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      Bills
    </button>
  </nav>
  <div class="account-bar">
    <div class="account-row">
      <div class="account-field">
        <label class="field-label">Account #</label>
        <input id="bill-account" type="tel" placeholder="—" autocomplete="off" class="account-input" />
      </div>
      <div class="customer-name-area" id="customer-display">
        <span class="cust-placeholder">Enter an account number</span>
      </div>
    </div>
    <div class="new-customer-row hidden" id="new-customer-row">
      <input id="bill-new-name" type="text" placeholder="Customer name (new — will be saved)" class="new-name-input" />
    </div>
  </div>
  <div class="cat-bar">
    <div class="cat-tabs" id="cat-tabs">
      <button class="cat-tab active" data-cat="all">All</button>
      <button class="cat-tab" data-cat="beer">Beer</button>
      <button class="cat-tab" data-cat="spirits">Spirits</button>
      <button class="cat-tab" data-cat="wine">Wine</button>
      <button class="cat-tab" data-cat="cocktails">Cocktails</button>
      <button class="cat-tab" data-cat="soft">Soft</button>
    </div>
  </div>
  <div class="drinks-scroll">
    <div class="drinks-grid" id="drinks-grid"></div>
  </div>
  <div class="order-panel collapsed" id="order-panel">
    <div class="order-bar" id="order-bar">
      <div class="order-bar-left">
        <span class="order-badge" id="order-count">0</span>
        <span class="order-bar-label">items in order</span>
      </div>
      <div class="order-bar-right">
        <strong class="order-total" id="order-total">₪0</strong>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
      </div>
    </div>
    <div class="order-body">
      <div class="order-items" id="order-items">
        <p class="order-empty">No drinks added yet — tap any drink above</p>
      </div>
      <div class="order-foot">
        <input id="bill-description" type="text" placeholder="Add a note (optional)" class="note-input" />
        <button id="bill-submit" class="submit-btn">Submit Bill</button>
        <div id="bill-feedback" class="bill-feedback hidden"></div>
      </div>
    </div>
  </div>
</div>

<!-- TABLE -->
<div class="screen" id="screen-table">
  <nav class="app-nav">
    <button class="nav-btn" data-target="screen-billing">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
      New Bill
    </button>
    <button class="nav-btn active" data-target="screen-table">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      Bills
    </button>
  </nav>
  <div class="table-controls">
    <select id="month-selector" class="month-select"></select>
    <div class="table-actions">
      <button id="export-csv" class="tbl-btn">Export CSV</button>
      <a id="open-sheet" href="#" target="_blank" class="tbl-btn tbl-btn-outline">Sheets ↗</a>
    </div>
  </div>
  <div class="bills-scroll">
    <div id="bills-table-container" class="bills-container">
      <p class="tbl-msg">Loading...</p>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
// Fill these in after setting up Google Sheets (see README)
const CONFIG = {
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbw2PKkSRFJ_GRXiTVNGQ2OuqSBeZylVoLZVN1wrcaKqDoT7XNfXd5kK13Ch1WBwox2B/exec",
  SHEET_ID: "1sxsuNSTTMBNdubWfsVWRgEFqZ624rOUTosX7TTh4Nhw",
  PASSWORD: "1948",
  DRINKS: [
    {id:"b1",name:"Draft Beer",  price:28,cat:"beer"},
    {id:"b2",name:"Bottle Beer", price:24,cat:"beer"},
    {id:"b3",name:"IPA",         price:32,cat:"beer"},
    {id:"b4",name:"Guinness",    price:30,cat:"beer"},
    {id:"s1",name:"Whiskey",     price:38,cat:"spirits"},
    {id:"s2",name:"Vodka",       price:35,cat:"spirits"},
    {id:"s3",name:"Tequila",     price:38,cat:"spirits"},
    {id:"s4",name:"Rum",         price:35,cat:"spirits"},
    {id:"s5",name:"Gin",         price:38,cat:"spirits"},
    {id:"s6",name:"Arak",        price:30,cat:"spirits"},
    {id:"w1",name:"House Wine",  price:35,cat:"wine"},
    {id:"w2",name:"Red Wine",    price:38,cat:"wine"},
    {id:"w3",name:"White Wine",  price:38,cat:"wine"},
    {id:"w4",name:"Rosé",        price:38,cat:"wine"},
    {id:"c1",name:"Mojito",      price:55,cat:"cocktails"},
    {id:"c2",name:"Margarita",   price:55,cat:"cocktails"},
    {id:"c3",name:"Negroni",     price:58,cat:"cocktails"},
    {id:"c4",name:"G&T",         price:42,cat:"cocktails"},
    {id:"c5",name:"Long Island", price:65,cat:"cocktails"},
    {id:"f1",name:"Soft Drink",  price:15,cat:"soft"},
    {id:"f2",name:"Water",       price:12,cat:"soft"},
    {id:"f3",name:"Coffee",      price:18,cat:"soft"},
    {id:"f4",name:"Fresh Juice", price:20,cat:"soft"},
  ],
};

// ── STATE ─────────────────────────────────────────────────
let currentOrder = [];
let currentBills = [];
let currentMonth = "";
let orderOpen    = false;
let billingReady = false;
let tableReady   = false;

// ── SCREENS ───────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ── API ───────────────────────────────────────────────────
const isDemo = () => CONFIG.APPS_SCRIPT_URL.includes("YOUR_SCRIPT_ID");

async function api(params) {
  const url = new URL(CONFIG.APPS_SCRIPT_URL);
  const pw  = sessionStorage.getItem("password") || "";
  Object.entries({...params, password: pw}).forEach(([k,v]) => url.searchParams.set(k,v));
  const res  = await fetch(url.toString());
  if (!res.ok) throw new Error("Network error");
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// ── LOGIN ─────────────────────────────────────────────────
function login() {
  const pw  = document.getElementById("login-password").value.trim();
  const err = document.getElementById("login-error");
  if (!pw) return;
  err.classList.remove("visible");

  if (pw === CONFIG.PASSWORD) {
    sessionStorage.setItem("password", pw);
    showScreen("screen-billing");
    initBilling();
  } else {
    err.classList.add("visible");
  }
}

// ── NAV ───────────────────────────────────────────────────
function initNav() {
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const t = btn.dataset.target;
      showScreen(t);
      if (t === "screen-billing") initBilling();
      if (t === "screen-table")   initTable();
    });
  });
}

// ── BILLING ───────────────────────────────────────────────
let lookupTimer = null;

function initBilling() {
  if (billingReady) return;
  billingReady = true;
  renderDrinks("all");

  document.getElementById("cat-tabs").addEventListener("click", e => {
    const tab = e.target.closest(".cat-tab");
    if (!tab) return;
    document.querySelectorAll(".cat-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    renderDrinks(tab.dataset.cat);
  });

  document.getElementById("bill-account").addEventListener("input", e => {
    clearTimeout(lookupTimer);
    lookupTimer = setTimeout(() => lookup(e.target.value.trim()), 380);
  });

  document.getElementById("order-bar").addEventListener("click", toggleOrder);
  document.getElementById("bill-submit").addEventListener("click", submitBill);
}

async function lookup(account) {
  const display = document.getElementById("customer-display");
  const newRow  = document.getElementById("new-customer-row");
  if (!account) {
    display.innerHTML = '<span class="cust-placeholder">Enter an account number</span>';
    newRow.classList.add("hidden");
    return;
  }
  if (isDemo()) {
    // In demo mode show a fake lookup result
    const fakeNames = {101:"Alice Cohen",102:"Ben Levi",103:"Dana Mizrahi",104:"Eli Shapiro",105:"Fiona Bar-On"};
    if (fakeNames[account]) {
      display.innerHTML = `<span class="cust-found">${fakeNames[account]}</span>`;
      newRow.classList.add("hidden");
    } else {
      display.innerHTML = '<span class="cust-not-found">Account not found</span>';
      newRow.classList.remove("hidden");
    }
    return;
  }
  display.innerHTML = '<span class="cust-loading">Looking up…</span>';
  try {
    const r = await api({action:"lookup", account});
    if (r.found) {
      display.innerHTML = `<span class="cust-found">${r.name}</span>`;
      newRow.classList.add("hidden");
    } else {
      display.innerHTML = '<span class="cust-not-found">Account not found</span>';
      newRow.classList.remove("hidden");
    }
  } catch {
    display.innerHTML = '<span class="cust-not-found">Lookup failed</span>';
  }
}

// ── DRINKS GRID ───────────────────────────────────────────
function renderDrinks(cat) {
  const list = cat === "all" ? CONFIG.DRINKS : CONFIG.DRINKS.filter(d => d.cat === cat);
  const grid = document.getElementById("drinks-grid");
  grid.innerHTML = "";
  list.forEach(drink => {
    const inOrder = currentOrder.find(o => o.drink.id === drink.id);
    const card = document.createElement("div");
    card.className = "drink-card" + (inOrder ? " has-items" : "");
    card.innerHTML = `
      ${inOrder ? `<span class="drink-badge">${inOrder.qty}</span>` : ""}
      <span class="drink-name">${drink.name}</span>
      <span class="drink-price">₪${drink.price}</span>`;
    card.addEventListener("click", () => addDrink(drink));
    grid.appendChild(card);
  });
}

function addDrink(drink) {
  const existing = currentOrder.find(o => o.drink.id === drink.id);
  if (existing) { existing.qty++; }
  else {
    currentOrder.push({drink, qty:1});
    if (currentOrder.length === 1) { orderOpen = true; document.getElementById("order-panel").classList.remove("collapsed"); }
  }
  syncOrder();
  renderDrinks(document.querySelector(".cat-tab.active")?.dataset.cat || "all");
}

function toggleOrder() {
  orderOpen = !orderOpen;
  document.getElementById("order-panel").classList.toggle("collapsed", !orderOpen);
}

function syncOrder() {
  const total = currentOrder.reduce((s,o) => s + o.drink.price * o.qty, 0);
  const count = currentOrder.reduce((s,o) => s + o.qty, 0);
  document.getElementById("order-count").textContent = count;
  document.getElementById("order-total").textContent = `₪${total.toFixed(2)}`;

  const box = document.getElementById("order-items");
  if (!currentOrder.length) {
    box.innerHTML = '<p class="order-empty">No drinks added yet — tap any drink above</p>';
    return;
  }
  box.innerHTML = "";
  currentOrder.forEach((o, i) => {
    const row = document.createElement("div");
    row.className = "order-item";
    row.innerHTML = `
      <span class="oi-name">${o.drink.name}</span>
      <div class="oi-qty">
        <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
        <span class="oi-qty-num">${o.qty}</span>
        <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
      </div>
      <span class="oi-price">₪${(o.drink.price*o.qty).toFixed(2)}</span>
      <button class="oi-remove" onclick="removeItem(${i})">✕</button>`;
    box.appendChild(row);
  });
}

function changeQty(i, delta) {
  currentOrder[i].qty += delta;
  if (currentOrder[i].qty <= 0) currentOrder.splice(i, 1);
  syncOrder();
  renderDrinks(document.querySelector(".cat-tab.active")?.dataset.cat || "all");
}

function removeItem(i) {
  currentOrder.splice(i, 1);
  syncOrder();
  renderDrinks(document.querySelector(".cat-tab.active")?.dataset.cat || "all");
}

// ── SUBMIT BILL ───────────────────────────────────────────
async function submitBill() {
  const account = document.getElementById("bill-account").value.trim();
  const newName = document.getElementById("bill-new-name").value.trim();
  const note    = document.getElementById("bill-description").value.trim();
  const isNew   = !document.getElementById("new-customer-row").classList.contains("hidden");
  const fb      = document.getElementById("bill-feedback");

  if (!account)             return showFeedback(fb, "Please enter an account number.", "error");
  if (!currentOrder.length) return showFeedback(fb, "Add at least one drink first.", "error");
  if (isNew && !newName)    return showFeedback(fb, "Enter the customer name to add them.", "error");

  const total    = currentOrder.reduce((s,o) => s + o.drink.price * o.qty, 0);
  const autoDesc = currentOrder.map(o => o.qty > 1 ? `${o.drink.name} ×${o.qty}` : o.drink.name).join(", ");
  const desc     = note ? `${autoDesc} — ${note}` : autoDesc;

  const btn = document.getElementById("bill-submit");
  btn.disabled = true; btn.textContent = "Submitting…";

  try {
    if (!isDemo()) {
      await api({action: isNew ? "addAndBill" : "bill", account, amount: total.toFixed(2), desc, name: newName});
    }
    showFeedback(fb, "✓ Bill submitted!", "success");
    resetForm();
    tableReady = false;
  } catch(err) {
    showFeedback(fb, "Error: " + err.message, "error");
  } finally {
    btn.disabled = false; btn.textContent = "Submit Bill";
  }
}

function showFeedback(el, msg, type) {
  el.textContent = msg;
  el.className = "bill-feedback " + type;
  setTimeout(() => el.classList.add("hidden"), 4500);
}

function resetForm() {
  ["bill-account","bill-new-name","bill-description"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("customer-display").innerHTML = '<span class="cust-placeholder">Enter an account number</span>';
  document.getElementById("new-customer-row").classList.add("hidden");
  currentOrder = []; orderOpen = false;
  document.getElementById("order-panel").classList.add("collapsed");
  syncOrder();
  renderDrinks(document.querySelector(".cat-tab.active")?.dataset.cat || "all");
}

// ── TABLE SCREEN ──────────────────────────────────────────
async function initTable() {
  if (tableReady) return;
  tableReady = true;
  if (isDemo()) {
    document.getElementById("bills-table-container").innerHTML =
      '<p class="tbl-msg">Connect Google Sheets to see bills here.</p>';
    return;
  }
  await loadMonths();
  if (currentMonth) await loadTable(currentMonth);
  document.getElementById("month-selector").addEventListener("change", e => loadTable(e.target.value));
  document.getElementById("export-csv").addEventListener("click", exportCSV);
}

async function loadMonths() {
  const sel = document.getElementById("month-selector");
  sel.innerHTML = "";
  try {
    const {months} = await api({action:"getMonths"});
    if (!months.length) { sel.innerHTML = '<option value="">No data yet</option>'; return; }
    months.forEach(m => {
      const o = document.createElement("option");
      o.value = m; o.textContent = fmtMonth(m); sel.appendChild(o);
    });
    currentMonth = months[0];
    document.getElementById("open-sheet").href = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/edit`;
  } catch { sel.innerHTML = '<option value="">Error loading</option>'; }
}

function fmtMonth(key) {
  const [y,m] = key.split("_");
  return new Date(+y, +m-1, 1).toLocaleString("default", {month:"long", year:"numeric"});
}

async function loadTable(month) {
  currentMonth = month;
  const box = document.getElementById("bills-table-container");
  box.innerHTML = '<p class="tbl-msg">Loading…</p>';
  try {
    const {bills} = await api({action:"getBills", month});
    currentBills = bills; renderTable(bills);
  } catch(err) {
    box.innerHTML = `<p class="tbl-msg" style="color:var(--red)">Failed: ${err.message}</p>`;
  }
}

function renderTable(bills) {
  const box = document.getElementById("bills-table-container");
  if (!bills.length) { box.innerHTML = '<p class="tbl-msg">No bills this month.</p>'; return; }
  const groups = {};
  bills.forEach(b => {
    if (!groups[b.account]) groups[b.account] = {name:b.name, bills:[], total:0};
    groups[b.account].bills.push(b);
    groups[b.account].total += parseFloat(b.amount) || 0;
  });
  const tbl = document.createElement("table");
  tbl.className = "bills-tbl";
  tbl.innerHTML = `<thead><tr><th>Acct</th><th>Customer</th><th>Total</th><th>#</th><th></th></tr></thead>`;
  const tbody = document.createElement("tbody");
  Object.entries(groups).sort(([a],[b]) => String(a).localeCompare(String(b))).forEach(([acct,g]) => {
    const gid = "g"+acct;
    const hr = document.createElement("tr");
    hr.className = "grp-row";
    hr.innerHTML = `<td><span class="acct-num">${acct}</span></td><td>${g.name}</td><td class="acct-total">₪${g.total.toFixed(2)}</td><td>${g.bills.length}</td><td><span class="expand-ico">▶</span></td>`;
    hr.addEventListener("click", () => {
      hr.classList.toggle("open");
      tbody.querySelectorAll(`[data-gid="${gid}"]`).forEach(r => r.classList.toggle("visible"));
    });
    tbody.appendChild(hr);
    g.bills.forEach(b => {
      const dr = document.createElement("tr");
      dr.className = "det-row"; dr.dataset.gid = gid;
      const dt = b.datetime ? new Date(b.datetime).toLocaleString() : "";
      dr.innerHTML = `<td></td><td>₪${parseFloat(b.amount||0).toFixed(2)}</td><td colspan="2" style="color:var(--text)">${b.description||""}</td><td style="color:var(--text3);font-size:.72rem">${dt}</td>`;
      tbody.appendChild(dr);
    });
  });
  tbl.appendChild(tbody); box.innerHTML = ""; box.appendChild(tbl);
}

function exportCSV() {
  if (!currentBills.length) return;
  const rows = [["AccountNumber","CustomerName","Amount","Description","DateTime"],
    ...currentBills.map(b => [b.account,b.name,b.amount,(b.description||"").replace(/,/g,";"),b.datetime])];
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(new Blob([rows.map(r=>r.join(",")).join("\n")], {type:"text/csv"})),
    download: `bills_${currentMonth}.csv`
  });
  a.click();
}

// ── BOOT ──────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("login-btn").addEventListener("click", login);
  document.getElementById("login-password").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });
  initNav();
  if (sessionStorage.getItem("password") === CONFIG.PASSWORD) {
    showScreen("screen-billing");
    initBilling();
  }
});
</script>
